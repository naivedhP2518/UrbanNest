<div class="profile-setup">
  <div class="container-sm">
    <div class="setup-header">
      <div class="setup-logo">
        <img src="/assets/logo.png" alt="UrbanNest Logo" class="logo-image">
        <span class="logo-text">Urban<span class="accent">Nest</span></span>
      </div>
      <h1>Complete Your Profile</h1>
      <p>Tell us a little about yourself to personalize your experience</p>
    </div>

    <div class="setup-card">
      <form (ngSubmit)="onSubmit()" #profileForm="ngForm">
        <!-- Role Selection -->
        <div class="setup-section">
          <h3>I'm interested in</h3>
          <div class="role-grid">
            <div class="role-card" [class.selected]="selectedRole === 'user'" (click)="selectRole('user')">
              <div class="role-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
              </div>
              <span class="role-name">Buying / Renting</span>
              <span class="role-desc">Find your dream property</span>
              <div class="role-check" *ngIf="selectedRole === 'user'">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
              </div>
            </div>
            <div class="role-card" [class.selected]="selectedRole === 'agent'" (click)="selectRole('agent')">
              <div class="role-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="20" height="14" x="2" y="7" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
              </div>
              <span class="role-name">I'm an Agent</span>
              <span class="role-desc">List & sell properties</span>
              <div class="role-check" *ngIf="selectedRole === 'agent'">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
              </div>
            </div>
          </div>
        </div>

        <!-- Add Phone -->
        <div class="form-group mb-4 animate-fade-in-up" style="animation-delay: 0.1s">
          <label>Phone Number</label>
          <input type="tel" name="phone" [(ngModel)]="phone" placeholder="+1 (555) 000-0000" class="input-field">
        </div>

        <!-- Extra fields for Agents -->
        <div class="agent-fields animate-fade-in-up" *ngIf="selectedRole === 'agent'" style="animation-delay: 0.2s">
          <h3>Agent Details</h3>
          <div class="form-group">
            <label for="bio">Bio / Description</label>
            <textarea id="bio" name="bio" [(ngModel)]="bio" placeholder="Tell buyers about your expertise..." rows="3"></textarea>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="experience">Years of Experience</label>
              <input type="number" id="experience" name="experience" [(ngModel)]="experience" placeholder="e.g. 5" min="0">
            </div>
            <div class="form-group">
              <label for="phone">Contact Phone</label>
              <input type="tel" id="phone" name="phone" [(ngModel)]="phone" placeholder="+91 98765 43210">
            </div>
          </div>
        </div>

        <!-- Contact for all users -->
        <div class="setup-section" *ngIf="selectedRole !== 'agent'">
          <h3>Contact (Optional)</h3>
          <div class="form-group">
            <label for="phone2">Phone Number</label>
            <input type="tel" id="phone2" name="phone2" [(ngModel)]="phone" placeholder="+91 98765 43210">
          </div>
        </div>

        <div *ngIf="error" class="error-message">{{ error }}</div>
        <div *ngIf="success" class="success-message">{{ success }}</div>

        <div class="setup-actions">
          <a routerLink="/properties" class="btn btn-ghost">Skip for now</a>
          <button type="submit" class="btn btn-primary btn-lg" [disabled]="loading">
            <span *ngIf="!loading">Complete Setup</span>
            <span *ngIf="loading" class="btn-loading"><span class="btn-spinner"></span> Saving...</span>
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
