<div class="container py-8">
  <div class="flex-between mb-8">
    <h1 class="text-3xl font-extrabold">Exclusive Properties</h1>
    <div class="filters-bar">
      <!-- Custom City Dropdown -->
      <div class="custom-dropdown" [class.open]="isCityDropdownOpen">
        <div class="dropdown-trigger" (click)="toggleCityDropdown()">
          <span>{{ getCityLabel() }}</span>
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="chevron" [class.up]="isCityDropdownOpen"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </div>
        <div class="dropdown-menu" *ngIf="isCityDropdownOpen">
          <div class="dropdown-option" *ngFor="let city of cities" [class.selected]="filters.city === city.value" (click)="selectCity(city.value)">
            {{ city.label }}
          </div>
        </div>
      </div>

      <!-- Custom Type Dropdown -->
      <div class="custom-dropdown" [class.open]="isTypeDropdownOpen">
        <div class="dropdown-trigger" (click)="toggleTypeDropdown()">
          <span>{{ getTypeLabel() }}</span>
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="chevron" [class.up]="isTypeDropdownOpen"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </div>
        <div class="dropdown-menu" *ngIf="isTypeDropdownOpen">
          <div class="dropdown-option" *ngFor="let type of types" [class.selected]="filters.type === type.value" (click)="selectType(type.value)">
            {{ type.label }}
          </div>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="loading" class="flex-center py-20">
    <div class="spinner"></div>
  </div>

  <div *ngIf="!loading && properties.length === 0" class="text-center py-20">
    <p class="text-muted">No properties found matching your criteria.</p>
  </div>

  <div class="property-grid" *ngIf="!loading && properties.length > 0">
    <div *ngFor="let property of properties" class="property-card" [routerLink]="['/properties', property._id]">
      <div class="card-image">
        <img [src]="property.images[0] || 'https://images.unsplash.com/photo-1518780664697-55e3ad937233?auto=format&fit=crop&w=500&q=80'" [alt]="property.title">
        <span class="type-badge" [class.rent]="property.type === 'Rent'">{{ property.type }}</span>
      </div>
      <div class="card-body">
        <h3 class="card-price">{{ property.price | currency:'INR' }}</h3>
        <h2 class="card-title">{{ property.title }}</h2>
        <p class="card-address">{{ property.address }}, {{ property.city }}</p>
        <div class="card-footer">
          <div class="agent-info">
            <img class="agent-thumb" [src]="property.agent.avatar ? (property.agent.avatar.startsWith('http') ? property.agent.avatar : 'http://localhost:5000' + property.agent.avatar) : 'assets/default-avatar.png'" [alt]="property.agent.name">
            <span class="agent-name">{{ property.agent.name }}</span>
          </div>
          <svg class="view-details-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
        </div>
      </div>
    </div>
  </div>
</div>
